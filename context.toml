# context.toml — Effector Engine Context Manifest
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for what the context aggregator includes per session.
#
# Profiles
# ────────
#   code   Core Python source + tests.  Engine logic, protocols, test failures.
#   mcp    MCP tools + registry + src schemas.  Tool behaviour, cultivation.
#   docs   README + worldbuilding + style bible.  Documentation, narrative.
#   full   Everything.  Architecture reviews, major refactors.
#
# Handling modes
# ──────────────
#   verbatim     Full content.  Decorative comment dividers stripped by default.
#   summarize    Registered summarizer (registry_state.json, .jsonl files).
#                Falls through to verbatim if no summarizer registered.
#   sample       N most-recently-modified files from a directory.
#                Good for sweep_results/, experiments/, outputs/ — directories
#                where some files have signal but not all of them, and you want
#                recency to decide.  Set sample_n and sample_strategy.
#   header_only  File paths listed only, no content.
#   skip         Always exclude regardless of profile.
#
# Zone fields
# ───────────
#   path              Relative to project root.
#   profiles          Which profiles include this zone.
#   handling          See modes above.
#   max_tokens        Soft token cap for the zone (verbatim + verbatim dirs).
#   max_file_size_kb  Skip individual files larger than this (verbatim dirs).
#   priority          1 (highest) – 5 (lowest).  Lower = included first.
#   label             Human-readable name in output headers.
#   excludes          Per-zone extra excludes (names, globs, or path substrings).
#   sample_n          Files to include in sample mode (default 5).
#   sample_strategy   newest | oldest | largest | alpha  (default newest).

[meta]
project       = "Effector Engine"
root_anchor   = "pyproject.toml"
token_budget  = 500000
strip_dividers = true   # set false to keep decorative # ─────── lines


# ─── Global excludes ──────────────────────────────────────────────────────────
# These stack on top of the built-in defaults in aggregate.py.
# Add project-specific noise here so you never have to remember --exclude-types.

[excludes]
extensions = [
    ".csv",        # data outputs — summarize or sample if needed
    ".tsv",
    ".pt",         # PyTorch checkpoints
    ".ckpt",       # training checkpoints
    ".safetensors",
]
directories = [
    "sweep_results",   # listed here so it's skipped in verbatim dirs;
                       # use the explicit sample zone below to include it
    "experiments",
    "outputs",
    "checkpoints",
    "wandb",
    ".neptune",
    "mlruns",
]


# ─── Always-included (all profiles) ──────────────────────────────────────────

[[zone]]
path     = "pyproject.toml"
profiles = ["code", "mcp", "docs", "full"]
handling = "verbatim"
priority = 1
label    = "Build manifest & dependencies"

[[zone]]
path     = "Host_Environment"
profiles = ["code", "mcp", "docs", "full"]
handling = "verbatim"
priority = 1
label    = "Host environment spec"


# ─── Code profile ─────────────────────────────────────────────────────────────

[[zone]]
path       = "effector"
profiles   = ["code", "mcp", "full"]
handling   = "verbatim"
priority   = 2
max_tokens = 80000
label      = "Core source (effector)"

[[zone]]
path     = "main_loop.py"
profiles = ["code", "full"]
handling = "verbatim"
priority = 2
label    = "Standalone orchestration entry point"

[[zone]]
path       = "tests"
profiles   = ["code", "full"]
handling   = "verbatim"
priority   = 3
max_tokens = 25000
label      = "Test suite"


# ─── MCP profile ──────────────────────────────────────────────────────────────

[[zone]]
path     = "mcp/registry_mcp.py"
profiles = ["mcp", "full"]
handling = "verbatim"
priority = 2
label    = "Snug Registry MCP server"

[[zone]]
path     = "mcp/cultivation_loop.py"
profiles = ["mcp", "full"]
handling = "verbatim"
priority = 2
label    = "Nightly cultivation loop"

[[zone]]
path     = "mcp/registry_state.json"
profiles = ["mcp", "full"]
handling = "summarize"
priority = 3
label    = "Registry state (live Affinity Matrix — summarized)"

[[zone]]
path     = "mcp/cultivation_log.jsonl"
profiles = ["mcp", "full"]
handling = "summarize"
priority = 4
label    = "Cultivation log (summarized — last 3 sessions + stats)"


# ─── Docs / narrative profile ─────────────────────────────────────────────────

[[zone]]
path     = "README.md"
profiles = ["docs", "full"]
handling = "verbatim"
priority = 1
label    = "README"

[[zone]]
path       = "docs/worldbuilding"
profiles   = ["docs", "full"]
handling   = "verbatim"
priority   = 2
max_tokens = 30000
label      = "Worldbuilding & narrative canon"

[[zone]]
path       = "docs/style"
profiles   = ["docs", "full"]
handling   = "verbatim"
priority   = 2
max_tokens = 15000
label      = "Visual style bible & look-dev"

[[zone]]
path       = "docs/protocol"
profiles   = ["docs", "code", "full"]
handling   = "verbatim"
priority   = 2
max_tokens = 40000
label      = "Protocol specification (DASP-1.1 + IEP-1.1)"


# ─── Sweep / experiment results ────────────────────────────────────────────────
# sweep_results/ is excluded from global verbatim walks (see [excludes] above).
# This zone brings it back for the full profile only, sampling the 5 newest
# files so you see recent signal without being buried in old runs.
#
# To include sweep results in another profile, add it to profiles below.
# To pull a specific file verbatim: python aggregate.py --include-file sweep_results/run_042.json

[[zone]]
path             = "sweep_results"
profiles         = ["full"]
handling         = "sample"
priority         = 4
sample_n         = 5
sample_strategy  = "newest"
max_file_size_kb = 512
label            = "Sweep results (5 most recent)"
excludes         = ["*.tmp", "*.lock"]

# Variant: if you have a separate experiments/ dir with per-experiment subdirs,
# oldest strategy gives you the stable baselines rather than the latest noise.
# Uncomment and adjust path as needed:
#
# [[zone]]
# path            = "experiments"
# profiles        = ["full"]
# handling        = "sample"
# priority        = 4
# sample_n        = 3
# sample_strategy = "oldest"
# label           = "Experiments (3 oldest baselines)"


# ─── Examples ─────────────────────────────────────────────────────────────────

[[zone]]
path     = "examples"
profiles = ["full"]
handling = "header_only"
priority = 5
label    = "Example scripts (paths only)"


# ─── Session header ───────────────────────────────────────────────────────────

[session_header]
enabled          = true
git_log_lines    = 8
show_dirty_files = true
show_topology    = true

[[zone]]
path     = "effector/intention"
profiles = ["code", "full"]
handling = "verbatim"
priority = 7
token_cap = 12000