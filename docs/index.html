<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snug Periodic Table - Scones, P. (2026)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fafaf9; color: #1c1917; }
        .pt-grid { display: grid; grid-template-columns: repeat(18, minmax(0, 1fr)); gap: 4px; min-width: 900px; padding: 1rem 0; }
        .el-cell { transition: all 0.15s ease; cursor: pointer; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; position: relative; border: 1px solid transparent; }
        .el-cell:hover { transform: scale(1.15); z-index: 20; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .el-cell.selected { transform: scale(1.1); z-index: 10; border-color: #1c1917; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .el-dim { opacity: 0.15; filter: grayscale(100%); pointer-events: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-6 md:p-12 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const ELEMENTS = [
            { n:1, sym:'Fc', name:'Felis catus', cat:'feline', sg:'2.1 × 10⁹', conf:'Very confident', desc:'The most potent passive Snug aggregator yet discovered. Draws ambient coziness from surroundings and concentrates it into a dense somatic reservoir.', props:['Languid Arrangement Effect','Passive aggregator','Purr-mediated emission','Highly selective'], col:1, row:1 },
            { n:2, sym:'Kn', name:'Kitten', cat:'feline', sg:'3.4 × 10⁹', conf:'Very confident', desc:'Exhibits elevated Snug density relative to adult specimens, likely due to higher surface-area-to-volume ratio and disproportionate softness.', props:['Peak density juvenile','Decay curve ~6mo','Paw-to-body ratio anomaly'], col:2, row:1 },
            { n:3, sym:'Cf', name:'Sleeping cat', cat:'feline', sg:'4.7 × 10⁹', conf:'Quite sure indeed', desc:'The dormant phase of Felis catus exhibits maximal Snug density. The Bun Configuration is a near-perfect Snug sphere.', props:['Bun Configuration','1.2m ambient field','Do not disturb'], col:3, row:1 },
            { n:4, sym:'Cs', name:'Cashmere', cat:'wool', sg:'9.1 × 10⁸', conf:'Quite sure indeed', desc:'Occupies a position of particular Snug significance. The finest wool fibre class known to science.', props:['Finest fibre class','Aspirational warmth','Age-improves'], col:15, row:1 },
            { n:5, sym:'Wl', name:'Wool blanket (unwashed)', cat:'wool', sg:'8.4 × 10⁸', conf:'Quite sure', desc:'The canonical Snug-active textile. Unwashed specimens exhibit higher density than laundered ones.', props:['Lanolin-Snug adhesion','Use-improves','Receptor concentration'], col:16, row:1 },
            { n:6, sym:'Fl', name:'Fleece', cat:'wool', sg:'6.2 × 10⁸', conf:'Fairly certain', desc:'Synthetic Snug-active fibre. Achieves respectable density through pile depth rather than lanolin content.', props:['Synthetic pile','Thermal compensator','Good cat-synergy'], col:17, row:1 },
            { n:7, sym:'Mo', name:'Mohair', cat:'wool', sg:'7.8 × 10⁸', conf:'Fairly certain', desc:'Angora goat fibre. Exhibits a light, halo-like Snug field that extends several centimetres beyond the physical textile boundary.', props:['Halo Snug field','Fluff interface zone','Loft-active'], col:18, row:1 },
            { n:8, sym:'Tc', name:'Hot tea (porcelain)', cat:'thermal', sg:'5.7 × 10⁸', conf:'Fairly certain', desc:'The archetypal warm vessel. Snug density decays with cooling — a time-dependent property unique to the thermal series.', props:['Time-dependent decay','Micro-Hug delivery','Porcelain-specific'], col:1, row:2 },
            { n:9, sym:'Ch', name:'Hot chocolate', cat:'thermal', sg:'6.9 × 10⁸', conf:'Quite sure', desc:'Exceeds plain tea in Snug density by a significant margin, attributed to the combined thermal and gustatory Snug contribution of dissolved cocoa solids.', props:['Cocoa-solid amplification','Cream bonus','Gustatory Snug'], col:2, row:2 },
            { n:10, sym:'Sp', name:'Soup (old wood bowl)', cat:'thermal', sg:'7.2 × 10⁸', conf:'Quite sure indeed', desc:'Achieves exceptional Snug density through the synergistic combination of thermal content and organic vessel.', props:['Vessel-dependent','Old-wood synergy','High thermal mass'], col:3, row:2 },
            { n:11, sym:'Bk', name:'Baked goods (fresh)', cat:'thermal', sg:'5.1 × 10⁸', conf:'Fairly certain', desc:'Warm baked goods in a kitchen setting exhibit Snug density concentrated in a diffuse olfactory field.', props:['Olfactory Snug field','Diffuse emission','Rapid decay curve'], col:4, row:2 },
            { n:12, sym:'Fi', name:'Fireplace', cat:'thermal', sg:'8.8 × 10⁸', conf:'Very confident', desc:'Highest Snug density in the thermal series. Projects a radial ambient contentment gradient.', props:['Radial Snug gradient','Wood > gas > electric','Amplifies adjacent elements'], col:5, row:2 },
            { n:13, sym:'Rn', name:'Rain (outside)', cat:'ambient', sg:'6.3 × 10⁸', conf:'Fairly certain', desc:'A critical contextual element. Rain on a window contributes substantially to indoor Snug density by creating a sharp environmental contrast gradient.', props:['Contrast gradient','Relational Snug','Window-mediated'], col:11, row:2 },
            { n:14, sym:'Fg', name:'Fog', cat:'ambient', sg:'4.2 × 10⁸', conf:'Fairly certain', desc:'Dense atmospheric water vapour contributes to ambient Snug density by softening the visual boundary between objects.', props:['Boundary-softening','Ground-level Fluff','Edge-reduction'], col:12, row:2 },
            { n:15, sym:'Tw', name:'Twilight', cat:'ambient', sg:'5.8 × 10⁸', conf:'Quite sure', desc:'The liminal light state between day and dark. Photons entering elevated Fluff density near the horizon decelerate.', props:['Fluff-decelerated photons','τ → 1 near horizon','Liminal state'], col:13, row:2 },
            { n:16, sym:'Cd', name:'Candlelight', cat:'ambient', sg:'5.4 × 10⁸', conf:'Quite sure', desc:'Flame-sourced light travels through locally elevated Fluff density before reaching the observer.', props:['Fluff-inhomogeneous path','Flicker = Fluff turbulence','Snuff-deficit noted'], col:14, row:2 },
            { n:17, sym:'Sm', name:'Smoked wood', cat:'wood', sg:'3.9 × 10⁸', conf:'Fairly certain', desc:'Wood processed by smoke exposure acquires additional Snug from the thermal history encoded in its grain.', props:['Thermal memory','Snug-as-memory','Residual field'], col:15, row:2 },
            { n:18, sym:'Ow', name:'Old wood', cat:'wood', sg:'4.5 × 10⁸', conf:'Fairly certain', desc:'Aged timber exhibits Snug density that increases with age — a property unique among inorganic materials.', props:['Age-accumulating','Thermal cycle memory','Antique bonus'], col:16, row:2 },
            { n:19, sym:'Ql', name:'Quilt', cat:'textile', sg:'5.9 × 10⁸', conf:'Quite sure', desc:'A layered textile system exhibiting emergent Snug properties exceeding the sum of its constituent materials.', props:['Emergent properties','Acoustic insulation','Provenance bonus'], col:1, row:3 },
            { n:20, sym:'Hn', name:'Handknit jumper', cat:'textile', sg:'6.8 × 10⁸', conf:'Quite sure indeed', desc:'Surpasses commercially produced knitwear by a significant margin due to embedded maker-Snug.', props:['Maker-Snug embedded','Temporal density gradient','Cable-pattern bonus'], col:2, row:3 },
            { n:21, sym:'Sk', name:'Soft sock', cat:'textile', sg:'4.7 × 10⁸', conf:'Fairly certain', desc:'Thick, soft socks constitute a foundational domestic Snug technology.', props:['Foot-receptor system','Disproportionate density','Patterning-neutral'], col:3, row:3 },
            { n:22, sym:'Pi', name:'Pillow (used)', cat:'textile', sg:'5.2 × 10⁸', conf:'Fairly certain', desc:'A used pillow carries Snug density above that of a new pillow, accumulating coziness through use.', props:['Use-accumulating','Deformation-Snug','Memory foam 60% proxy'], col:4, row:3 },
            { n:23, sym:'Hd', name:'Hood (up)', cat:'textile', sg:'5.5 × 10⁸', conf:'Fairly certain', desc:'The raised hood constitutes a portable micro-environment with significantly elevated ambient contentment.', props:['Portable micro-env','Acoustic dampening','Drawstring intentionality'], col:5, row:3 },
            { n:24, sym:'Bt', name:'Blanket fort', cat:'transitional', sg:'7.7 × 10⁸', conf:'Very confident', desc:'A constructed environment formed by arranging textiles over furniture to create an enclosed space.', props:['Spatial exclusion','Boundary gradient','Age-independent effect'], col:8, row:3 },
            { n:25, sym:'Wn', name:'Window seat', cat:'transitional', sg:'6.1 × 10⁸', conf:'Quite sure', desc:'A transitional element: architecturally interior but perceptually liminal.', props:['Liminal position','Contrast gradient access','Cushion-depth sensitive'], col:9, row:3 },
            { n:26, sym:'Nt', name:'Night train', cat:'transitional', sg:'6.5 × 10⁸', conf:'Fairly certain', desc:'Long-distance night rail travel exhibits unexpectedly high Snug density.', props:['Transit-dependent','Signal-light photons','Motion-induced Fluff'], col:10, row:3 },
            { n:27, sym:'Lm', name:'Lamplight', cat:'ambient', sg:'4.9 × 10⁸', conf:'Fairly certain', desc:'A table or floor lamp with warm-spectrum bulb creates a localised Snug field.', props:['Cone-bounded field','Reading-optimised','Spectrum-sensitive'], col:11, row:3 },
            { n:28, sym:'Lb', name:'Library', cat:'ambient', sg:'5.6 × 10⁸', conf:'Quite sure', desc:'A room containing a substantial collection of books exhibits ambient Snug density exceeding the sum of individual volumes.', props:['Collective reading field','Olfactory component','Wood-shelf dependent'], col:12, row:3 },
            { n:29, sym:'Ec', name:'Empty office chair', cat:'inert', sg:'1.2 × 10⁵', conf:'Confident', desc:'The empty office chair exhibits not active Snug deficit but a condition of Snug neutrality.', props:['Near-zero density','Slow recovery','Cat-reversal possible'], col:17, row:3 },
            { n:30, sym:'Od', name:'Open downloads folder', cat:'inert', sg:'3.0 × 10³', conf:'Fairly certain', desc:'An open Downloads folder exhibits the lowest Snug density of any commonly observed digital object.', props:['Highly variable','Chaos-correlated','Tidy state: unmeasured'], col:18, row:3 },
            { n:31, sym:'Fl', name:'Fluorescent lighting', cat:'deficit', sg:'−4.2 × 10⁶', conf:'Confident', desc:'Fluorescent lighting actively withdraws Snug from its environment.', props:['Active Snug withdrawal','Flicker-frequency linked','LED-partial mitigation'], col:1, row:4 },
            { n:32, sym:'Op', name:'Open-plan office', cat:'deficit', sg:'−6.1 × 10⁶', conf:'Confident', desc:'A compound Snug-deficit environment formed by the interaction of lighting, chairs, and ambient productivity pressure.', props:['Compound deficit','Social pressure term','No known remediation'], col:2, row:4 },
            { n:33, sym:'Rf', name:'Ring doorbell notification', cat:'deficit', sg:'−1.8 × 10⁶', conf:'Fairly certain', desc:'A sudden alert produces a spike Snug deficit event, disrupting the accumulation gradient.', props:['Spike deficit','40-90s duration','Gradient disruption'], col:3, row:4 },
            { n:34, sym:'Dm', name:'Deadline reminder', cat:'deficit', sg:'−3.3 × 10⁶', conf:'Confident', desc:'Produces a Snug deficit proportional to the urgency of the referenced task.', props:['Contextual deficit','Urgency-proportional','State-revealing'], col:4, row:4 },
            { n:35, sym:'Pv', name:'Patchwork velvet', cat:'textile', sg:'7.4 × 10⁸', conf:'Quite sure', desc:'Velvet exhibits unusually directional Snug density: significantly higher when stroked with the nap.', props:['Pile polarity','Vector Snug','Constructive interference'], col:9, row:4 },
            { n:36, sym:'Ln', name:'Linen (washed)', cat:'textile', sg:'4.8 × 10⁸', conf:'Fairly certain', desc:'Linen exhibits increasing Snug density with each wash cycle — up to approximately 40 washes.', props:['Wash-accumulating','40-cycle plateau','Paradox: new < worn'], col:10, row:4 },
            { n:37, sym:'Ha', name:'Hammock', cat:'transitional', sg:'5.3 × 10⁸', conf:'Fairly certain', desc:'Exhibits a Snug density dependent on ambient conditions to an unusual degree.', props:['Condition-dependent','Intentional sway','Outdoor-optimised'], col:11, row:4 },
            { n:38, sym:'Bn', name:'Bath (very warm)', cat:'thermal', sg:'6.4 × 10⁸', conf:'Quite sure', desc:'Achieves Snug density through total immersive thermal contact.', props:['Total contact','Steam halo','Book+tea synergy'], col:12, row:4 },
            { n:39, sym:'Op', name:'Old paper', cat:'wood', sg:'3.6 × 10⁸', conf:'Fairly certain', desc:'Aged paper exhibits an olfactory Snug field produced by the chemical decomposition of cellulose.', props:['Chemical Snug encoding','Furfural-mediated','100yr plateau'], col:13, row:4 },
            { n:40, sym:'Aw', name:'Autumn walk', cat:'ambient', sg:'5.0 × 10⁸', conf:'Fairly certain', desc:'A category of ambient Snug arising from the interaction of colour temperature, thermal contrast, and dry leaves.', props:['Fully emergent','Multi-factor interaction','Relational Snug'], col:14, row:4 },
            { n:41, sym:'Pr', name:'Purring (at source)', cat:'feline', sg:'2.9 × 10⁹', conf:'Quite sure indeed', desc:'The acoustic emission of a purring cat constitutes a distinct Snug element.', props:['Resonant coupling','25-150Hz range','Contact-dependent'], col:1, row:5 },
            { n:42, sym:'Mm', name:'Morning (first light)', cat:'ambient', sg:'4.6 × 10⁸', conf:'Fairly certain', desc:'The first light of a clear morning constitutes a Snug event distinct from later daylight.', props:['Low-angle Fluff photons','Bed-decision bonus','Spectral Snug'], col:2, row:5 },
            { n:43, sym:'Ss', name:'Sunday afternoon', cat:'ambient', sg:'5.5 × 10⁸', conf:'Quite sure', desc:'Sunday afternoon exhibits elevated ambient contentment arising from the temporal position between obligations.', props:['Temporal element','Permission-structure Snug','Obligation-free zone'], col:3, row:5 },
            { n:44, sym:'Hg', name:'The Big Hug', cat:'feline', sg:'∞', conf:'Quite sure indeed', desc:'The predicted terminal state of the universe at t → ∞, when Snug distribution variance approaches zero.', props:['Terminal cosmological state','Maximal entropy (Snug)','Not the Heat Death'], col:4, row:5 },
            { n:45, sym:'Gs', name:'Good conversation', cat:'ambient', sg:'6.0 × 10⁸', conf:'Fairly certain', desc:'Interpersonal Snug arising from sustained, comfortable dialogue.', props:['Interpersonal Snug','Tangent-tolerant','Anti-clock property'], col:5, row:5 },
            { n:46, sym:'Np', name:'Neptune (contented)', cat:'inert', sg:'2.1 × 10⁴', conf:'Fairly certain', desc:'Neptune has found its optimal arrangement — cold, quiet, and left alone.', props:['Optimal arrangement found','Cold comfort','Do not pressure'], col:11, row:5 },
            { n:47, sym:'Fl', name:'Fluff (medium)', cat:'ambient', sg:'variable', conf:'Fairly certain', desc:'The pervasive medium hypothesised to govern light propagation via resistive settling.', props:['Pervasive medium','Speed-selective','τ near horizon = 1'], col:12, row:5 },
            { n:48, sym:'Sg', name:'Snug (fundamental)', cat:'wool', sg:'1', conf:'Quite sure indeed', desc:'The fundamental, indivisible unit of coziness.', props:['Indivisible','Conserved','Photon-equivalent in transit'], col:13, row:5 }
        ];

        const CATS = {
            feline: { id: 'feline', label: 'Feline group', bg: '#FBEAF0', text: '#72243E', border: '#D4537E' },
            wool: { id: 'wool', label: 'Wool & fibre', bg: '#EEEDFE', text: '#3C3489', border: '#7F77DD' },
            thermal: { id: 'thermal', label: 'Thermal series', bg: '#FAECE7', text: '#712B13', border: '#D85A30' },
            wood: { id: 'wood', label: 'Wood & organic', bg: '#FAEEDA', text: '#633806', border: '#BA7517' },
            textile: { id: 'textile', label: 'Textile & soft', bg: '#E1F5EE', text: '#085041', border: '#1D9E75' },
            ambient: { id: 'ambient', label: 'Ambient', bg: '#E6F1FB', text: '#0C447C', border: '#378ADD' },
            transitional: { id: 'transitional', label: 'Transitional', bg: '#EAF3DE', text: '#27500A', border: '#639922' },
            inert: { id: 'inert', label: 'Inert (low Sg)', bg: '#F1EFE8', text: '#444441', border: '#888780' },
            deficit: { id: 'deficit', label: 'Snug-deficit', bg: '#FCEBEB', text: '#791F1F', border: '#A32D2D' }
        };

        const App = () => {
            const [selected, setSelected] = React.useState(null);
            const [filter, setFilter] = React.useState(null);

            const toggleFilter = (catId) => {
                setFilter(filter === catId ? null : catId);
                setSelected(null);
            };

            const gridCells = Array(5 * 18).fill(null);
            ELEMENTS.forEach(el => {
                const idx = ((el.row - 1) * 18) + (el.col - 1);
                gridCells[idx] = el;
            });

            return (
                <div className="max-w-6xl mx-auto flex flex-col gap-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-stone-200 pb-4">
                        <div>
                            <h1 className="text-2xl font-semibold tracking-tight text-stone-800">Snug Periodic Table</h1>
                            <p className="text-sm text-stone-500 font-medium">Scones, P. (2026) · Cozy Nature, Vol. 12</p>
                        </div>
                        <div className="flex flex-wrap gap-2 justify-end">
                            {Object.values(CATS).map(cat => (
                                <button
                                    key={cat.id}
                                    onClick={() => toggleFilter(cat.id)}
                                    className={`px-3 py-1 text-xs font-semibold rounded-full border transition-all ${filter === cat.id ? 'shadow-inner scale-95 ring-2 ring-offset-1 ring-stone-400' : 'hover:scale-105 shadow-sm'}`}
                                    style={{ backgroundColor: cat.bg, color: cat.text, borderColor: filter === cat.id ? cat.text : cat.border + '60' }}
                                >
                                    {cat.label}
                                </button>
                            ))}
                            {filter && (
                                <button onClick={() => setFilter(null)} className="px-3 py-1 text-xs font-semibold rounded-full bg-stone-200 text-stone-600 hover:bg-stone-300 transition-colors">
                                    Clear Filter
                                </button>
                            )}
                        </div>
                    </header>

                    <div className="w-full overflow-x-auto hide-scrollbar">
                        <div className="pt-grid">
                            {gridCells.map((el, i) => {
                                if (!el) return <div key={i} className="aspect-square"></div>;
                                
                                const catStyle = CATS[el.cat];
                                const isSelected = selected?.n === el.n;
                                const isDimmed = filter && filter !== el.cat;

                                return (
                                    <div
                                        key={el.n}
                                        onClick={() => setSelected(isSelected ? null : el)}
                                        className={`el-cell ${isSelected ? 'selected' : ''} ${isDimmed ? 'el-dim' : ''}`}
                                        style={{ backgroundColor: catStyle.bg, color: catStyle.text, borderColor: isSelected ? '#1c1917' : catStyle.border + '40' }}
                                    >
                                        <span className="absolute top-1 left-1 text-[9px] opacity-70 font-medium leading-none">{el.n}</span>
                                        <span className="text-lg font-bold leading-none mt-1">{el.sym}</span>
                                        <span className="text-[8px] opacity-80 text-center leading-[1.1] mt-1 px-0.5 truncate w-full">{el.name}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="bg-white border border-stone-200 rounded-xl p-6 min-h-[160px] shadow-sm flex flex-col justify-center transition-all">
                        {selected ? (
                            <div className="flex flex-col md:flex-row gap-8 items-start">
                                <div 
                                    className="flex flex-col items-center justify-center rounded-lg p-6 min-w-[120px] shadow-sm border"
                                    style={{ backgroundColor: CATS[selected.cat].bg, color: CATS[selected.cat].text, borderColor: CATS[selected.cat].border + '40' }}
                                >
                                    <span className="text-5xl font-bold mb-1">{selected.sym}</span>
                                    <span className="text-sm font-medium">Sg-{selected.n}</span>
                                </div>
                                <div className="flex-1 space-y-3">
                                    <div>
                                        <h2 className="text-2xl font-bold text-stone-800">{selected.name}</h2>
                                        <div className="flex items-center gap-3 text-sm text-stone-500 mt-1 font-mono">
                                            <span>Density: {selected.sg} Sg·cm⁻³</span>
                                            <span>•</span>
                                            <span>Confidence: {selected.conf}</span>
                                        </div>
                                    </div>
                                    <p className="text-stone-600 leading-relaxed text-sm">{selected.desc}</p>
                                    <div className="flex flex-wrap gap-2 pt-2">
                                        {selected.props.map((prop, idx) => (
                                            <span key={idx} className="bg-stone-100 border border-stone-200 text-stone-600 px-2 py-1 rounded text-xs font-medium">
                                                {prop}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center text-stone-400 italic">
                                Select an element from the grid to examine its Snug properties.
                            </div>
                        )}
                    </div>
                    
                    <footer className="text-right text-xs text-stone-400 font-mono mt-4 border-t border-stone-200 pt-4">
                        κ = 0.618 ± 0.04 · Snug unit: Sg (dimensionless, positive definite) · G_L = 6.674 × 10⁻¹¹ Sg·m·kg⁻²
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
